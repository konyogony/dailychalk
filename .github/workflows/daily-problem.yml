name: Fetch Daily Math Problems

# Runs daily at 6 AM UTC to fetch new problems from Supabase.
# Hints and full solutions are generated by Gemini AI when not present in the Supabase payload.

on:
    schedule:
        - cron: '0 6 * * *'
    workflow_dispatch:

permissions:
    contents: write

jobs:
    fetch-problems:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Setup Bun
              uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - name: Install dependencies
              run: bun install

            - name: Fetch new problems
              id: fetch
              continue-on-error: true
              env:
                  SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
                  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
              run: bun run generate-daily

            - name: Commit and push changes
              if: steps.fetch.outcome == 'success'
              run: |
                  git config --local user.email "action@github.com"
                  git config --local user.name "GitHub Action"
                  git add data/problems.json
                  if git diff --staged --quiet; then
                    echo "No changes to commit"
                  else
                    git commit -m "Daily math problems update - $(date +'%Y-%m-%d')"
                    git push
                  fi

            - name: Send failure email notification
              if: failure() && steps.fetch.outcome == 'failure'
              uses: dawidd6/action-send-mail@v3
              with:
                  server_address: smtp.gmail.com
                  server_port: 587
                  username: ${{ secrets.MAIL_USERNAME }}
                  password: ${{ secrets.MAIL_PASSWORD }}
                  subject: '❌ Daily Math Problem Fetch Failed'
                  to: ${{ secrets.MAIL_TO }}
                  from: Daily Chalk Bot
                  body: |
                      The daily math problem fetch workflow has failed after all retry attempts.

                      Repository: ${{ github.repository }}
                      Workflow: ${{ github.workflow }}
                      Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

                      Please check the workflow logs for details:
                      ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

                      Problems are fetched from Supabase. Verify that SUPABASE_ANON_KEY is set
                      and that the Supabase endpoints are reachable.
